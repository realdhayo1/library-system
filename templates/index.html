<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Library Catalogue</title>
    <link rel="stylesheet" href="/static/style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
    <h1>University Library Catalogue</h1>
    <p>Search books, journals, research papers and more</p>
</header>

<!-- SEARCH BOX -->
<div class="search-container">

    <form action="/search" method="GET">

        <input
            type="text"
            name="q"
            placeholder="Search books, authors, ISBN..."
            required>

        <button type="submit">
            Search
        </button>

    </form>

</div>

<!-- CATEGORY SECTION -->
<div class="container">

    <h2>Explore Library Sections</h2>

    <div class="categories">

        <a href="/books" class="category-card">
            📚 Books
        </a>

        <a href="/journals" class="category-card">
            📑 Journals
        </a>

        <a href="/research" class="category-card">
            🔬 Research Papers
        </a>

        <a href="/magazines" class="category-card">
            📰 Magazines
        </a>

        <a href="/new-arrivals" class="category-card">
            🆕 New Arrivals
        </a>

    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>University Library System © 2026</p>
</footer>

</body>
</html>
