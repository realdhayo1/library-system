<!DOCTYPE html>
<html>
<head>
    <title>Library Catalogue Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h2>Results for "{{ query }}"</h2>

    {% if books %}
        {% for book in books %}
            <div class="book-card">

                {% if book.cover %}
                    <img src="{{ book.cover }}"
                         alt="Book Cover"
                         class="book-cover">
                {% endif %}

                <div class="book-info">
                    <h3>{{ book.title }}</h3>

                    <p>
                        <strong>Author:</strong>
                        {{ book.author }}
                    </p>

                    <p>
                        <strong>Year:</strong>
                        {{ book.year }}
                    </p>

                    <p>
                        <strong>ISBN:</strong>
                        {{ book.isbn }}
                    </p>

                    <a href="{{ book.url }}"
                       target="_blank">
                       View on Open Library
                    </a>

                </div>
            </div>
        {% endfor %}

    {% else %}
        <p>No books found.</p>
    {% endif %}

    <br>
    <a href="/">⬅ Back to Search</a>

</div>

</body>
</html>
